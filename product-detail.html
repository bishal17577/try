<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d0d">
    <title>Product Detail - Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ── RESET & FIXED APP ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f7fb;
            color: #0d0d0d;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100%;
            margin: 0 auto;
            background: #f4f7fb;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            background: #0d0d0d;
            color: #fff;
            padding: 4px 16px 4px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }

        /* ── HEADER ── */
        .header {
            background: #0d0d0d;
            padding: 8px 14px 12px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-top .brand {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-top .brand h1 {
            font-size: 17px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .header-top .brand h1 span { color: #7dd3c4; }
        .header-top .back-btn {
            color: #fff;
            font-size: 20px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-top .back-btn:active { background: rgba(255,255,255,0.1); }

        .header-top .actions {
            display: flex;
            gap: 4px;
        }
        .header-top .actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            position: relative;
            min-width: 36px;
            min-height: 36px;
        }
        .header-top .actions button:active { background: rgba(255,255,255,0.2); }
        .header-top .actions button .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #e63b2e;
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #0d0d0d;
        }
        .header-top .actions button .badge.show { display: flex; }

        /* ── MAIN CONTENT ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 64px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .main::-webkit-scrollbar { width: 0; display: none; }

        /* ── PRODUCT DETAIL ── */
        .product-detail {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8ecf0;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .detail-gallery {
            position: relative;
            background: #e9ebee;
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
        }
        .detail-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-gallery .badge-sale {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e63b2e;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            z-index: 2;
        }
        .detail-gallery .badge-stock {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 9px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            z-index: 2;
        }
        .detail-gallery .badge-stock.out { background: rgba(208,0,0,0.8); }
        .detail-gallery .badge-stock.low { background: rgba(200,120,0,0.8); }

        .detail-body {
            padding: 14px 16px 18px;
        }
        .detail-body .shop-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #6b727a;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
            margin-bottom: 2px;
        }
        .detail-body .shop-link:active { color: #0d0d0d; }
        .detail-body .product-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 3px;
        }
        .detail-body .product-meta {
            font-size: 12px;
            color: #6b727a;
            margin-bottom: 6px;
        }
        .detail-body .price-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .detail-body .price-row .price {
            font-size: 22px;
            font-weight: 800;
            color: #e63b2e;
        }
        .detail-body .price-row .orig {
            font-size: 14px;
            color: #6b727a;
            text-decoration: line-through;
        }
        .detail-body .price-row .discount-tag {
            background: #e63b2e;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .detail-body .description {
            font-size: 13px;
            color: #6b727a;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        /* Quantity Selector */
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .qty-selector label {
            font-size: 12px;
            font-weight: 600;
            color: #0d0d0d;
        }
        .qty-selector .qty-controls {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid #e8ecf0;
            border-radius: 20px;
            overflow: hidden;
        }
        .qty-selector .qty-controls button {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            background: #f4f7fb;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }
        .qty-selector .qty-controls button:active { background: #e8ecf0; }
        .qty-selector .qty-controls span {
            width: 36px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            padding: 4px 0;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #0d0d0d;
            color: #fff;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
            border: none;
            margin-bottom: 6px;
        }
        .add-to-cart-btn:active:not(:disabled) { transform: scale(0.97); }
        .add-to-cart-btn:disabled {
            background: #c4c8ce;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .buy-now-btn {
            width: 100%;
            padding: 12px;
            background: #e63b2e;
            color: #fff;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
            border: none;
        }
        .buy-now-btn:active:not(:disabled) { transform: scale(0.97); }
        .buy-now-btn:disabled {
            background: #c4c8ce;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ── SHOP INFO CARD ── */
        .shop-info-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8ecf0;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .shop-info-card .si-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .shop-info-card .si-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
            border-bottom: 1px solid #f0f2f5;
        }
        .shop-info-card .si-row:last-child { border-bottom: none; }
        .shop-info-card .si-row .label { color: #6b727a; }
        .shop-info-card .si-row .value { font-weight: 500; }

        /* ── RELATED PRODUCTS ── */
        .related-section {
            margin-top: 12px;
        }
        .related-section .section-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .related-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 2px 0 10px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .related-scroll::-webkit-scrollbar { display: none; }
        .related-card {
            flex-shrink: 0;
            width: 130px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8ecf0;
            overflow: hidden;
            cursor: pointer;
        }
        .related-card:active { transform: scale(0.97); }
        .related-card .r-img {
            height: 100px;
            overflow: hidden;
            background: #e9ebee;
        }
        .related-card .r-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .related-card .r-body {
            padding: 6px 8px 8px;
        }
        .related-card .r-body .r-name {
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .related-card .r-body .r-price {
            font-size: 12px;
            font-weight: 700;
            color: #0d0d0d;
        }

        /* ── TOAST ── */
        #toastContainer {
            position: absolute;
            bottom: 64px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }
        .toast {
            background: #1e2226;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            font-size: 11px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            animation: slideUp 0.25s ease;
        }
        .toast.error { background: #b00020; }
        .toast.warning { background: #925700; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── LOADING ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #6b727a;
        }
        .loading-state .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e8ecf0;
            border-top-color: #0d0d0d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY ── */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #6b727a;
        }
        .empty .e-icon { font-size: 48px; display: block; margin-bottom: 8px; }
        .empty h3 { color: #0d0d0d; font-size: 17px; margin-bottom: 2px; }
        .empty p { font-size: 13px; }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(14px);
            border-top: 1px solid #e8ecf0;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 4px 0 6px;
            z-index: 100;
            flex-shrink: 0;
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 8px;
            font-weight: 500;
            color: #6b727a;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            min-height: 36px;
            padding: 2px 6px;
            border-radius: 8px;
            transition: color 0.2s;
            position: relative;
        }
        .bn-item.active { color: #0d0d0d; }
        .bn-item .bn-icon { font-size: 17px; }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #e63b2e;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
            min-width: 12px;
            height: 12px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 2px;
        }
        .bn-item .badge.show { display: flex; }

        /* ── RESPONSIVE ── */
        @media (min-width: 768px) {
            body { overflow: auto; position: relative; }
            .app { height: 100vh; max-height: 100vh; border-radius: 0; }
            .product-detail {
                display: flex;
                align-items: stretch;
                margin-top: 12px;
            }
            .detail-gallery {
                flex: 1;
                aspect-ratio: 1/1;
                max-width: 50%;
            }
            .detail-body {
                flex: 1;
                padding: 20px 24px;
            }
            .detail-body .product-name { font-size: 22px; }
            .detail-body .price-row .price { font-size: 24px; }
            .related-card { width: 160px; }
            .related-card .r-img { height: 120px; }
        }
        @media (min-width: 1024px) {
            .detail-gallery { max-width: 45%; }
            .detail-body { padding: 28px 32px; }
            .detail-body .product-name { font-size: 26px; }
            .detail-body .price-row .price { font-size: 28px; }
            .related-card { width: 180px; }
            .related-card .r-img { height: 140px; }
        }
        @media (max-width: 480px) {
            .header-top .brand h1 { font-size: 15px; }
            .detail-body .product-name { font-size: 16px; }
            .detail-body .price-row .price { font-size: 19px; }
            .add-to-cart-btn, .buy-now-btn { font-size: 13px; padding: 10px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

    <!-- TOAST -->

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",

    }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, onAuthStateChanged } from 'firebase/auth';
import {
    getFirestore, collection, doc, getDocs, getDoc,
    query, where, limit, orderBy, serverTimestamp, updateDoc, setDoc
} from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
    authDomain: "bishalshrestha17-de676.firebaseapp.com",
    projectId: "bishalshrestha17-de676",
    storageBucket: "bishalshrestha17-de676.firebasestorage.app",
    messagingSenderId: "631628771230",
    appId: "1:631628771230:web:389c6430535f6a46b6708f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── DOM REFS ──
const $ = id => document.getElementById(id);
const galleryEl = $('productGallery');
const bodyEl = $('productBody');
const shopInfoCard = $('shopInfoCard');
const shopInfoContent = $('shopInfoContent');
const relatedSection = $('relatedSection');
const relatedProductsEl = $('relatedProducts');
const cartBadgeEl = $('cartBadge');
const notifBadgeEl = $('notifBadge');

// ── STATUS BAR TIME ──
function updateTime() {
    const now = new Date();
    $('statusTime').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateTime(); setInterval(updateTime, 30000);

// ── TOAST ──
function showToast(msg, type = 'success') {
    const c = $('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

// ── GET PRODUCT ID ──
function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('productId') || params.get('id');
}

// ── QUANTITY ──
let quantity = 1;
let currentProduct = null;

window.updateQty = function(delta) {
    const newQty = quantity + delta;
    if (newQty < 1) return;
    if (currentProduct && newQty > (currentProduct.stock || 0)) {
        showToast('Not enough stock', 'warning');
        return;
    }
    quantity = newQty;
    const display = document.getElementById('qtyDisplay');
    if (display) display.textContent = quantity;
};

// ── ADD TO CART ──
window.addToCart = async function() {
    if (!currentProduct) { showToast('Product not loaded', 'error'); return; }
    if (currentProduct.stock <= 0) { showToast('Out of stock!', 'error'); return; }

    const user = auth.currentUser;
    if (!user) { showToast('Please login', 'error'); window.location.href = 'auth.html'; return; }

    try {
        const cartRef = doc(db, 'cart', user.uid);
        const cartDoc = await getDoc(cartRef);
        const item = {
            productId: currentProduct.id,
            shopId: currentProduct.shopId,
            shopName: currentProduct.shopName || 'Shop',
            productName: currentProduct.productName || 'Product',
            price: currentProduct.discountPrice || currentProduct.price || 0,
            originalPrice: currentProduct.price || 0,
            qty: quantity,
            unit: currentProduct.unit || '',
            imageURL: currentProduct.imageURL || ''
        };

        if (cartDoc.exists()) {
            const items = cartDoc.data().items || [];
            const idx = items.findIndex(i => i.productId === currentProduct.id);
            if (idx >= 0) {
                items[idx].qty += quantity;
            } else {
                items.push(item);
            }
            await updateDoc(cartRef, { items, updatedAt: serverTimestamp() });
        } else {
            await setDoc(cartRef, { items: [item], createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        }

        if (navigator.vibrate) navigator.vibrate(20);
        showToast(`${item.productName} added to cart 🛒`, 'success');
        updateCartBadge();
        quantity = 1;
        const display = document.getElementById('qtyDisplay');
        if (display) display.textContent = '1';
    } catch (err) {
        showToast('Failed to add to cart', 'error');
    }
};

window.buyNow = async function() {
    await addToCart();
    window.location.href = 'cart.html';
};

// ── LOAD PRODUCT ──
async function loadProduct() {
    const productId = getProductId();
    if (!productId) {
        bodyEl.innerHTML = `
            <div class="empty">
                <span class="e-icon">🔍</span>
                <h3>Product not found</h3>
                <p>Invalid product ID</p>
                <button onclick="window.location.href='index.html'" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">Go Home</button>
            </div>
        `;
        galleryEl.innerHTML = '';
        return;
    }

    try {
        const productDoc = await getDoc(doc(db, 'products', productId));
        if (!productDoc.exists()) {
            bodyEl.innerHTML = `
                <div class="empty">
                    <span class="e-icon">📦</span>
                    <h3>Product not found</h3>
                    <p>This product doesn't exist or was removed.</p>
                    <button onclick="window.location.href='index.html'" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">Go Home</button>
                </div>
            `;
            galleryEl.innerHTML = '';
            return;
        }

        currentProduct = { id: productDoc.id, ...productDoc.data() };
        renderProduct(currentProduct);

        // Load related products
        if (currentProduct.category) {
            loadRelatedProducts(currentProduct.category, currentProduct.id);
        }

        // Load shop info
        if (currentProduct.shopId) {
            loadShopInfo(currentProduct.shopId);
        }

    } catch (error) {
        console.error('Error loading product:', error);
        bodyEl.innerHTML = `
            <div class="empty">
                <span class="e-icon">⚠️</span>
                <h3>Error loading product</h3>
                <p>${error.message}</p>
                <button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">🔄 Retry</button>
            </div>
        `;
        galleryEl.innerHTML = '';
    }
}

function renderProduct(product) {
    const finalPrice = product.discountPrice || product.price || 0;
    const stock = product.stock || 0;
    const stockClass = stock <= 0 ? 'out' : (stock < 5 ? 'low' : '');
    const discount = product.discountPercent || (product.discountPrice ? Math.round((1 - product.discountPrice / product.price) * 100) : 0);
    const hasSale = product.onSale || discount > 0;
    const imageURL = product.imageURL || 'https://picsum.photos/seed/' + encodeURIComponent(product.productName || product.id) + '/800/800';
    const isOutOfStock = stock <= 0;

    // Gallery
    galleryEl.innerHTML = `
        <img src="${imageURL}" alt="${product.productName || 'Product'}" loading="lazy" onerror="this.src='https://picsum.photos/800/800'">
        ${hasSale ? `<span class="badge-sale">${discount > 0 ? `-${discount}%` : 'SALE'}</span>` : ''}
        <span class="badge-stock ${stockClass}">${isOutOfStock ? 'Out of Stock' : stock + ' left'}</span>
    `;

    // Body
    bodyEl.innerHTML = `
        <div class="shop-link" onclick="window.location.href='shop-detail.html?shopId=${product.shopId || ''}'">
            🏪 ${product.shopName || 'Local Shop'} →
        </div>
        <div class="product-name">${product.productName || 'Product'}</div>
        <div class="product-meta">${product.unit || ''} ${product.category ? '• ' + product.category : ''}</div>
        <div class="price-row">
            <span class="price">Rs. ${finalPrice.toLocaleString()}</span>
            ${product.discountPrice ? `<span class="orig">Rs. ${(product.price || 0).toLocaleString()}</span>` : ''}
            ${discount > 0 ? `<span class="discount-tag">-${discount}%</span>` : ''}
        </div>
        <div class="description">${product.description || 'No description available.'}</div>

        <div class="qty-selector">
            <label>Quantity</label>
            <div class="qty-controls">
                <button onclick="updateQty(-1)">−</button>
                <span id="qtyDisplay">1</span>
                <button onclick="updateQty(1)">+</button>
            </div>
        </div>

        <button class="add-to-cart-btn" ${isOutOfStock ? 'disabled' : ''} onclick="addToCart()">
            🛒 ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
        </button>
        <button class="buy-now-btn" ${isOutOfStock ? 'disabled' : ''} onclick="buyNow()">
            ⚡ Buy Now
        </button>
    `;
}

// ── LOAD SHOP INFO ──
async function loadShopInfo(shopId) {
    if (!shopId) return;
    try {
        const shopDoc = await getDoc(doc(db, 'shops', shopId));
        if (shopDoc.exists()) {
            const shop = shopDoc.data();
            shopInfoCard.style.display = 'block';
            shopInfoContent.innerHTML = `
                <div class="si-row"><span class="label">Shop Name</span><span class="value">${shop.shopName || 'N/A'}</span></div>
                <div class="si-row"><span class="label">Category</span><span class="value">${shop.category || 'N/A'}</span></div>
                <div class="si-row"><span class="label">Location</span><span class="value">${shop.address || ''}${shop.district ? ', ' + shop.district : ''}</span></div>
                <div class="si-row"><span class="label">Phone</span><span class="value">${shop.phone || 'N/A'}</span></div>
                <div class="si-row"><span class="label">Status</span><span class="value" style="color:${shop.isOpen ? '#00aa00' : '#cc0000'};">${shop.isOpen ? '🟢 Open' : '🔴 Closed'}</span></div>
            `;
        }
    } catch (error) {
        console.error('Error loading shop info:', error);
    }
}

// ── LOAD RELATED PRODUCTS ──
async function loadRelatedProducts(category, excludeId) {
    try {
        const q = query(
            collection(db, 'products'),
            where('category', '==', category),
            where('isActive', '==', true),
            limit(10)
        );
        const snap = await getDocs(q);
        let products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        products = products.filter(p => p.id !== excludeId);
        products = products.slice(0, 8);

        if (products.length === 0) {
            relatedSection.style.display = 'none';
            return;
        }

        relatedSection.style.display = 'block';
        relatedProductsEl.innerHTML = products.map(p => `
            <div class="related-card" onclick="window.location.href='product-detail.html?productId=${p.id}'">
                <div class="r-img">
                    <img src="${p.imageURL || 'https://picsum.photos/seed/' + encodeURIComponent(p.productName || p.id) + '/400/400'}" 
                         alt="${p.productName || 'Product'}" loading="lazy"
                         onerror="this.src='https://picsum.photos/400/400'">
                </div>
                <div class="r-body">
                    <div class="r-name">${p.productName || 'Product'}</div>
                    <div class="r-price">Rs. ${(p.discountPrice || p.price || 0).toLocaleString()}</div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading related products:', error);
        relatedSection.style.display = 'none';
    }
}

// ── BADGES ──
async function updateCartBadge() {
    const user = auth.currentUser;
    if (!user) { cartBadgeEl.classList.remove('show'); return; }
    try {
        const c = await getDoc(doc(db, 'cart', user.uid));
        const count = c.exists() ? (c.data().items || []).reduce((s, i) => s + (i.qty || 0), 0) : 0;
        cartBadgeEl.textContent = count > 99 ? '99+' : count;
        cartBadgeEl.classList.toggle('show', count > 0);
    } catch {}
}

async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadgeEl.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive', '==', true)));
        const unread = ns.size - read.length;
        notifBadgeEl.textContent = unread > 99 ? '99+' : unread;
        notifBadgeEl.classList.toggle('show', unread > 0);
    } catch {}
}

// ── PROFILE ──
function updateProfile(user) {
    const profileBtn = document.querySelector('.header-top .actions button:last-child');
    if (!profileBtn) return;
    if (user) {
        const name = user.displayName || user.email || 'User';
        profileBtn.textContent = name.charAt(0).toUpperCase();
        if (user.photoURL) {
            profileBtn.innerHTML = `<img src="${user.photoURL}" alt="${name}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        }
    } else {
        profileBtn.textContent = '👤';
    }
}

// ── AUTH ──
onAuthStateChanged(auth, user => { updateProfile(user); updateCartBadge(); updateNotifBadge(); });

// ── INIT ──
loadProduct();

console.log('🦁 Simha — Product Detail Page');
</script>
