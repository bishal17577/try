<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Image Upload - Simha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            color: #000000;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            padding: 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header .logo {
            font-size: 40px;
            display: block;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }

        /* ===== UPLOAD AREA ===== */
        .upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .upload-area:hover {
            border-color: #000;
            background: #fafafa;
        }
        .upload-area.dragover {
            border-color: #000;
            background: #f0f0f0;
        }
        .upload-area .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .upload-area h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .upload-area p {
            color: #888;
            font-size: 13px;
        }
        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* ===== PREVIEW ===== */
        .preview-container {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: #f8f8f8;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }
        .preview-container.show {
            display: block;
        }
        .preview-container .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            background: #fff;
        }
        .preview-container .file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 13px;
            color: #666;
        }
        .preview-container .file-info .name {
            font-weight: 500;
            color: #000;
        }

        /* ===== PROGRESS ===== */
        .progress-container {
            display: none;
            margin-top: 16px;
        }
        .progress-container.show {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e8e8e8;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #000;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        /* ===== RESULT ===== */
        .result-container {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px solid #d0d0d0;
        }
        .result-container.show {
            display: block;
        }
        .result-container .url {
            font-size: 13px;
            word-break: break-all;
            color: #000;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            margin-top: 8px;
        }
        .result-container .copy-btn {
            margin-top: 8px;
            padding: 6px 16px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .result-container .copy-btn:hover {
            opacity: 0.8;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
            margin-top: 16px;
        }
        .btn-primary:hover:not(:disabled) {
            opacity: 0.8;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            padding: 6px 16px;
            background: transparent;
            color: #000;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-secondary:hover {
            border-color: #000;
            background: #f5f5f5;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: #000;
            color: #fff;
            padding: 14px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: center;
            font-size: 14px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.success { background: #000; }
        .toast.error { background: #cc0000; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .upload-area { padding: 24px 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="header">
            <span class="logo">🖼️</span>
            <h1>Image Upload</h1>
            <p>Upload images to ImageBB and get a direct URL</p>
        </div>

        <!-- ===== UPLOAD AREA ===== -->
        <div class="upload-area" id="uploadArea">
            <span class="icon">📤</span>
            <h3>Click or drag to upload</h3>
            <p>Supports JPG, PNG, WEBP, GIF • Max 5MB</p>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif">
        </div>

        <!-- ===== PREVIEW ===== -->
        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="previewImage" src="" alt="Preview">
            <div class="file-info">
                <span class="name" id="fileName">image.jpg</span>
                <span id="fileSize">0 KB</span>
                <button class="btn-secondary" onclick="removeFile()">✕ Remove</button>
            </div>
        </div>

        <!-- ===== PROGRESS ===== -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressLabel">Uploading...</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <!-- ===== UPLOAD BUTTON ===== -->
        <button class="btn-primary" id="uploadBtn" disabled>Upload to ImageBB</button>

        <!-- ===== RESULT ===== -->
        <div class="result-container" id="resultContainer">
            <strong style="font-size:14px;">✅ Upload Successful!</strong>
            <div class="url" id="resultUrl">https://i.ibb.co/xxx.jpg</div>
            <button class="copy-btn" onclick="copyUrl()">📋 Copy URL</button>
            <button class="btn-secondary" style="margin-left:8px;" onclick="resetUpload()">🔄 Upload Another</button>
        </div>
    </div>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- ===== ALL JAVASCRIPT (INTERNAL) ===== -->
    <!-- ============================================================ -->
    <script>
        // ============================================================
        // IMAGEBB API KEY
        // ============================================================
        const IMAGEBB_API_KEY = 'f69fb2e400656818bbdb2b33cb144c3f';

        // ============================================================
        // DOM REFS
        // ============================================================
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');
        const progressPercent = document.getElementById('progressPercent');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultContainer = document.getElementById('resultContainer');
        const resultUrl = document.getElementById('resultUrl');

        // ============================================================
        // STATE
        // ============================================================
        let selectedFile = null;

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // FILE VALIDATION
        // ============================================================
        function validateFile(file) {
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('Invalid file type. Please upload JPG, PNG, WEBP, or GIF.', 'error');
                return false;
            }
            if (file.size > 5 * 1024 * 1024) {
                showToast('Image must be under 5MB.', 'error');
                return false;
            }
            return true;
        }

        // ============================================================
        // FORMAT FILE SIZE
        // ============================================================
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // ============================================================
        // HANDLE FILE SELECT
        // ============================================================
        function handleFile(file) {
            if (!file) return;

            if (!validateFile(file)) {
                fileInput.value = '';
                return;
            }

            selectedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                previewContainer.classList.add('show');
                fileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);
                uploadBtn.disabled = false;
                resultContainer.classList.remove('show');
            };
            reader.readAsDataURL(file);
        }

        // ============================================================
        // FILE INPUT CHANGE
        // ============================================================
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                handleFile(this.files[0]);
            }
        });

        // ============================================================
        // DRAG AND DROP
        // ============================================================
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // ============================================================
        // REMOVE FILE
        // ============================================================
        window.removeFile = function() {
            selectedFile = null;
            fileInput.value = '';
            previewContainer.classList.remove('show');
            previewImage.src = '';
            uploadBtn.disabled = true;
            progressContainer.classList.remove('show');
            resultContainer.classList.remove('show');
            progressFill.style.width = '0%';
        };

        // ============================================================
        // UPLOAD TO IMAGEBB
        // ============================================================
        window.uploadToImageBB = async function() {
            if (!selectedFile) {
                showToast('Please select an image first', 'error');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            progressContainer.classList.add('show');
            resultContainer.classList.remove('show');

            try {
                // Convert to base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        resolve(e.target.result.split(',')[1]);
                    };
                    reader.onerror = function(e) {
                        reject(new Error('Failed to read file'));
                    };
                    reader.readAsDataURL(selectedFile);
                });

                // Update progress
                progressFill.style.width = '30%';
                progressPercent.textContent = '30%';
                progressLabel.textContent = 'Preparing...';

                // Upload to ImageBB
                const formData = new FormData();
                formData.append('key', IMAGEBB_API_KEY);
                formData.append('image', base64);

                progressFill.style.width = '50%';
                progressPercent.textContent = '50%';
                progressLabel.textContent = 'Uploading...';

                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                progressFill.style.width = '80%';
                progressPercent.textContent = '80%';
                progressLabel.textContent = 'Processing...';

                const data = await response.json();

                if (data.success) {
                    const url = data.data.url;
                    
                    progressFill.style.width = '100%';
                    progressPercent.textContent = '100%';
                    progressLabel.textContent = 'Complete! ✅';

                    // Show result
                    resultUrl.textContent = url;
                    resultContainer.classList.add('show');
                    
                    showToast('Upload successful! 🎉', 'success');

                } else {
                    throw new Error(data.error?.message || 'Upload failed');
                }

            } catch (error) {
                console.error('Upload error:', error);
                showToast('Upload failed: ' + error.message, 'error');
                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                progressLabel.textContent = 'Failed ❌';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload to ImageBB';
            }
        };

        // ============================================================
        // COPY URL
        // ============================================================
        window.copyUrl = function() {
            const url = resultUrl.textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast('URL copied to clipboard! 📋', 'success');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('URL copied to clipboard! 📋', 'success');
            });
        };

        // ============================================================
        // RESET UPLOAD
        // ============================================================
        window.resetUpload = function() {
            removeFile();
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';
            progressLabel.textContent = 'Uploading...';
            progressContainer.classList.remove('show');
        };

        // ============================================================
        // UPLOAD BUTTON CLICK
        // ============================================================
        uploadBtn.addEventListener('click', window.uploadToImageBB);

        // ============================================================
        // MAKE FUNCTIONS GLOBAL
        // ============================================================
        window.showToast = showToast;
        window.uploadToImageBB = window.uploadToImageBB;
        window.copyUrl = window.copyUrl;
        window.removeFile = window.removeFile;
        window.resetUpload = window.resetUpload;

        console.log('🚀 ImageBB Upload Utility ready');
        console.log('🔑 API Key:', IMAGEBB_API_KEY);
    </script>
</body>
</html>
