<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Profile - Simha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            color: #000000;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            font-size: inherit;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 16px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: 800;
            color: #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo span {
            font-size: 24px;
        }
        .navbar .logo .sub {
            font-weight: 400;
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 4px;
        }
        .navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .nav-actions .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ===== PROFILE HEADER ===== */
        .profile-header {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }
        .profile-header .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 12px;
            border: 3px solid #000;
            object-fit: cover;
        }
        .profile-header .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-header .name {
            font-size: 22px;
            font-weight: 700;
        }
        .profile-header .email {
            font-size: 14px;
            color: #888;
        }
        .profile-header .role-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
            background: #f0f0f0;
            border: 1px solid #d0d0d0;
        }
        .profile-header .member-since {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* ===== STATS ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 20px;
            font-weight: 700;
        }
        .stat-box .label {
            font-size: 12px;
            color: #888;
        }

        /* ===== SECTION ===== */
        .section {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 20px;
            margin-bottom: 16px;
        }
        .section h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .section .section-link {
            color: #000;
            text-decoration: underline;
            font-size: 13px;
            cursor: pointer;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #000;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #000;
        }
        .form-group .file-input-wrapper {
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .form-group .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .form-group .file-input-wrapper .file-label {
            display: block;
            padding: 8px 14px;
            border: 1px dashed #d0d0d0;
            border-radius: 8px;
            text-align: center;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .form-group .file-input-wrapper .file-label:hover {
            border-color: #000;
        }
        .form-group .file-preview {
            margin-top: 8px;
            max-height: 100px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }
        .form-group .file-preview.show {
            display: block;
        }
        .form-group .file-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            padding: 10px 24px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary:hover:not(:disabled) {
            opacity: 0.8;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            color: #000;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-secondary:hover {
            border-color: #000;
            background: #f5f5f5;
        }
        .btn-danger {
            padding: 10px 24px;
            background: #cc0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        .btn-danger:hover {
            opacity: 0.8;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .btn-group .btn-primary {
            flex: 1;
            min-width: 140px;
            text-align: center;
        }
        .btn-group .btn-secondary {
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        /* ===== ORDER ITEMS ===== */
        .order-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .order-item .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .order-item .order-id {
            font-weight: 600;
            font-size: 14px;
        }
        .order-item .order-status {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 50px;
        }
        .order-item .order-status.pending { background: #f0e000; color: #000; }
        .order-item .order-status.confirmed { background: #000; color: #fff; }
        .order-item .order-status.delivered { background: #000; color: #fff; }
        .order-item .order-status.cancelled { background: #cc0000; color: #fff; }
        .order-item .order-details {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        .order-item .order-total {
            font-weight: 700;
            font-size: 14px;
        }

        /* ===== FAVORITE SHOPS ===== */
        .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .favorite-item:last-child {
            border-bottom: none;
        }
        .favorite-item .shop-name {
            font-weight: 600;
        }
        .favorite-item .shop-category {
            font-size: 12px;
            color: #888;
        }
        .favorite-item .remove-fav {
            color: #cc0000;
            font-size: 18px;
            padding: 4px;
        }
        .favorite-item .remove-fav:hover {
            transform: scale(1.2);
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: #000;
            color: #fff;
            padding: 14px 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.success { background: #000; }
        .toast.error { background: #cc0000; }
        .toast.warning { background: #cc8800; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            display: none;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 99;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #888;
            transition: color 0.2s;
            cursor: pointer;
            gap: 2px;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
        }
        .bottom-nav .nav-item.active {
            color: #000;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .bottom-nav {
                display: flex;
            }
            .stats-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn-group .btn-primary,
            .btn-group .btn-secondary {
                flex: none;
                width: 100%;
            }
        }
        @media (max-width: 480px) {
            .profile-header .avatar {
                width: 64px;
                height: 64px;
                font-size: 24px;
            }
            .profile-header .name {
                font-size: 18px;
            }
        }
    </style>
</head>

    <script type="importmap">
    {
        "imports": {

            "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",

    <script type="module">
        // ============================================================
        // FIREBASE IMPORTS
        // ============================================================
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut,
            updateProfile,
            sendEmailVerification
        } from 'firebase/auth';
        import {
            getFirestore,
            collection,
            doc,
            getDoc,
            getDocs,
            updateDoc,
            deleteDoc,
            query,
            where,
            orderBy,
            limit,
            serverTimestamp
        } from 'firebase/firestore';

        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
            authDomain: "bishalshrestha17-de676.firebaseapp.com",
            projectId: "bishalshrestha17-de676",
            storageBucket: "bishalshrestha17-de676.firebasestorage.app",
            messagingSenderId: "631628771230",
            appId: "1:631628771230:web:389c6430535f6a46b6708f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================
        // STATE
        // ============================================================
        let currentUser = null;
        let userData = null;
        let userRole = 'customer';
        let favorites = [];
        let orders = [];

        // ============================================================
        // DOM REFS
        // ============================================================
        const profileAvatar = document.getElementById('profileAvatar');
        const profileName = document.getElementById('profileName');
        const profileEmail = document.getElementById('profileEmail');
        const profileRole = document.getElementById('profileRole');
        const memberSince = document.getElementById('memberSince');
        const statOrders = document.getElementById('statOrders');
        const statFavorites = document.getElementById('statFavorites');
        const statSpent = document.getElementById('statSpent');
        const editName = document.getElementById('editName');
        const editPhone = document.getElementById('editPhone');
        const recentOrders = document.getElementById('recentOrders');
        const favoritesList = document.getElementById('favoritesList');
        const dashboardSection = document.getElementById('dashboardSection');
        const adminBtn = document.getElementById('adminBtn');
        const shopBtn = document.getElementById('shopBtn');

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        window.showToast = showToast;

        // ============================================================
        // IMAGEBB UPLOAD
        // ============================================================
        async function uploadToImageBB(file) {
            return new Promise((resolve, reject) => {
                const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
                if (!validTypes.includes(file.type)) {
                    reject(new Error('Invalid file type'));
                    return;
                }
                if (file.size > 5 * 1024 * 1024) {
                    reject(new Error('Image must be under 5MB'));
                    return;
                }

                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64 = e.target.result.split(',')[1];
                    const formData = new FormData();
                    formData.append('key', 'f69fb2e400656818bbdb2b33cb144c3f');
                    formData.append('image', base64);

                    try {
                        const response = await fetch('https://api.imgbb.com/1/upload', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        if (data.success) {
                            resolve(data.data.url);
                        } else {
                            reject(new Error(data.error?.message || 'Upload failed'));
                        }
                    } catch (error) {
                        reject(new Error('Upload failed: ' + error.message));
                    }
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        // PREVIEW IMAGE
        // ============================================================
        window.previewImage = function(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.querySelector('img').src = e.target.result;
                    preview.classList.add('show');
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        // ============================================================
        // LOAD PROFILE
        // ============================================================
        async function loadProfile(user) {
            if (!user) return;

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    showToast('User data not found', 'error');
                    return;
                }

                userData = userDoc.data();
                userRole = userData.role || 'customer';

                // Update UI
                const name = userData.name || user.displayName || 'User';
                const email = userData.email || user.email || 'No email';
                const initial = name.charAt(0).toUpperCase();

                profileAvatar.innerHTML = userData.profilePhotoURL 
                    ? `<img src="${userData.profilePhotoURL}" alt="${name}">` 
                    : initial;
                profileAvatar.style.background = userData.profilePhotoURL ? 'transparent' : '#000';
                profileAvatar.style.color = userData.profilePhotoURL ? 'transparent' : '#fff';

                profileName.textContent = name;
                profileEmail.textContent = email;
                profileRole.textContent = userRole === 'admin' ? '🛡️ Admin' : 
                                         userRole === 'shop' ? '🏪 Shop Owner' : '👤 Customer';

                if (userData.createdAt) {
                    const date = userData.createdAt.toDate ? 
                        userData.createdAt.toDate() : new Date(userData.createdAt);
                    memberSince.textContent = `Member since: ${date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
                }

                // Fill edit form
                editName.value = name;
                editPhone.value = userData.phone || '';

                // Show dashboard buttons
                if (userRole === 'admin') {
                    dashboardSection.style.display = 'block';
                    adminBtn.style.display = 'inline-block';
                    shopBtn.style.display = 'none';
                } else if (userRole === 'shop') {
                    dashboardSection.style.display = 'block';
                    adminBtn.style.display = 'none';
                    shopBtn.style.display = 'inline-block';
                } else {
                    dashboardSection.style.display = 'none';
                }

                // Load orders
                await loadOrders(user.uid);

                // Load favorites
                favorites = userData.favorites || [];
                await loadFavorites();

                // Update stats
                statOrders.textContent = orders.length;
                statFavorites.textContent = favorites.length;
                const totalSpent = orders
                    .filter(o => o.status === 'delivered')
                    .reduce((sum, o) => sum + (o.totalAmount || 0), 0);
                statSpent.textContent = `Rs. ${totalSpent.toLocaleString()}`;

            } catch (error) {
                console.error('Error loading profile:', error);
                showToast('Failed to load profile', 'error');
            }
        }

        // ============================================================
        // LOAD ORDERS
        // ============================================================
        async function loadOrders(uid) {
            try {
                const q = query(
                    collection(db, 'orders'),
                    where('customerId', '==', uid),
                    orderBy('createdAt', 'desc'),
                    limit(5)
                );
                const snapshot = await getDocs(q);
                orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                if (orders.length === 0) {
                    recentOrders.innerHTML = `<div style="text-align:center;padding:12px;color:#888;">No orders yet</div>`;
                    return;
                }

                recentOrders.innerHTML = orders.map(order => `
                    <div class="order-item" onclick="window.location.href='orders.html'">
                        <div class="order-header">
                            <span class="order-id">${order.orderId || order.id}</span>
                            <span class="order-status ${order.status || 'pending'}">${(order.status || 'Pending').toUpperCase()}</span>
                        </div>
                        <div class="order-details">
                            ${order.shopName || 'Shop'} • ${order.items?.length || 0} items
                        </div>
                        <div class="order-total">Rs. ${(order.totalAmount || 0).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
                recentOrders.innerHTML = `<div style="text-align:center;padding:12px;color:#888;">Failed to load orders</div>`;
            }
        }

        // ============================================================
        // LOAD FAVORITES
        // ============================================================
        async function loadFavorites() {
            if (!favorites || favorites.length === 0) {
                favoritesList.innerHTML = `<div style="text-align:center;padding:12px;color:#888;">No favorites yet</div>`;
                return;
            }

            try {
                let html = '';
                for (const shopId of favorites) {
                    const shopDoc = await getDoc(doc(db, 'shops', shopId));
                    if (shopDoc.exists()) {
                        const shop = shopDoc.data();
                        html += `
                            <div class="favorite-item">
                                <div onclick="window.location.href='shop-detail.html?shopId=${shopId}'" style="flex:1;cursor:pointer;">
                                    <div class="shop-name">${shop.shopName || 'Shop'}</div>
                                    <div class="shop-category">${shop.category || ''} • ${shop.district || ''}</div>
                                </div>
                                <button class="remove-fav" onclick="removeFavorite('${shopId}')">✕</button>
                            </div>
                        `;
                    }
                }
                favoritesList.innerHTML = html || `<div style="text-align:center;padding:12px;color:#888;">No favorites found</div>`;
            } catch (error) {
                console.error('Error loading favorites:', error);
                favoritesList.innerHTML = `<div style="text-align:center;padding:12px;color:#888;">Failed to load favorites</div>`;
            }
        }

        // ============================================================
        // REMOVE FAVORITE
        // ============================================================
        window.removeFavorite = async function(shopId) {
            if (!currentUser) return;
            try {
                const userRef = doc(db, 'users', currentUser.uid);
                const updatedFavorites = favorites.filter(id => id !== shopId);
                await updateDoc(userRef, { favorites: updatedFavorites });
                favorites = updatedFavorites;
                statFavorites.textContent = favorites.length;
                await loadFavorites();
                showToast('Removed from favorites', 'info');
            } catch (error) {
                console.error('Error removing favorite:', error);
                showToast('Failed to remove favorite', 'error');
            }
        };

        // ============================================================
        // SAVE PROFILE
        // ============================================================
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const name = editName.value.trim();
                const phone = editPhone.value.trim();

                if (!name) {
                    showToast('Name is required', 'error');
                    btn.disabled = false;
                    btn.textContent = '💾 Save Changes';
                    return;
                }

                const updateData = {
                    name: name,
                    phone: phone,
                    updatedAt: serverTimestamp()
                };

                // Upload photo if selected
                const photoFile = document.getElementById('editPhoto').files[0];
                if (photoFile) {
                    const photoURL = await uploadToImageBB(photoFile);
                    updateData.profilePhotoURL = photoURL;
                }

                // Update Firestore
                await updateDoc(doc(db, 'users', currentUser.uid), updateData);

                // Update Auth profile
                if (photoFile) {
                    await updateProfile(currentUser, {
                        displayName: name,
                        photoURL: updateData.profilePhotoURL || currentUser.photoURL
                    });
                } else {
                    await updateProfile(currentUser, { displayName: name });
                }

                showToast('Profile updated successfully! ✅', 'success');
                document.getElementById('photoPreview').classList.remove('show');
                
                // Reload profile
                await loadProfile(currentUser);

            } catch (error) {
                console.error('Error saving profile:', error);
                showToast('Failed to save profile: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '💾 Save Changes';
            }
        });

        // ============================================================
        // LOGOUT
        // ============================================================
        window.handleLogout = async function() {
            if (!confirm('Are you sure you want to logout?')) return;
            try {
                await signOut(auth);
                showToast('Logged out successfully 👋', 'info');
                window.location.href = 'auth.html';
            } catch (error) {
                console.error('Error logging out:', error);
                showToast('Failed to logout', 'error');
            }
        };

        // ============================================================
        // AUTH STATE
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadProfile(user);
            } else {
                window.location.href = 'auth.html';
            }
        });

        // ============================================================
        // GLOBAL FUNCTIONS
        // ============================================================
        window.previewImage = window.previewImage;
        window.removeFavorite = window.removeFavorite;
        window.handleLogout = window.handleLogout;
        window.showToast = showToast;

        console.log('🚀 Profile Page loaded');
    </script>
</body>
</html>
