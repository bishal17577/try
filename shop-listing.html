<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Shops - Simha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            color: #000000;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            font-size: inherit;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        img {
            max-width: 100%;
            display: block;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 16px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: 800;
            color: #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo span {
            font-size: 24px;
        }
        .navbar .logo .sub {
            font-weight: 400;
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: 4px;
        }
        .navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .nav-actions .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .navbar .nav-actions .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            object-fit: cover;
        }
        .navbar .nav-actions .profile-avatar:hover {
            border-color: #000;
        }
        .navbar .nav-actions .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .page-title {
            font-size: 18px;
            font-weight: 700;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ===== SEARCH BAR ===== */
        .search-bar {
            background: #ffffff;
            border-radius: 10px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e0e0e0;
            transition: border-color 0.2s;
            margin: 16px 0;
        }
        .search-bar:focus-within {
            border-color: #000;
        }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: #000;
            font-family: 'Inter', sans-serif;
        }
        .search-bar input::placeholder {
            color: #999;
        }
        .search-bar .search-icon {
            color: #999;
            font-size: 18px;
        }
        .search-bar .clear-btn {
            color: #999;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .search-bar .clear-btn.show {
            display: block;
        }
        .search-bar .voice-btn {
            color: #999;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .search-bar .voice-btn:hover {
            color: #000;
        }
        .search-bar .voice-btn.recording {
            color: #cc0000;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ===== RECENT SEARCHES ===== */
        .recent-searches {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: -8px 0 12px;
        }
        .recent-search-chip {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .recent-search-chip:hover {
            border-color: #000;
            background: #fff;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 8px;
        }
        .filter-bar::-webkit-scrollbar {
            display: none;
        }
        .filter-chip {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip:hover {
            border-color: #000;
        }
        .filter-chip.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }
        .filter-chip .count {
            font-size: 11px;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ===== SHOP GRID ===== */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 8px 0 16px;
        }
        .shop-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }
        .shop-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .shop-card .shop-img {
            height: 140px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .shop-card .shop-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shop-card .shop-img .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
        }
        .shop-card .shop-img .status-badge.open {
            background: #000;
            color: #fff;
        }
        .shop-card .shop-img .status-badge.closed {
            background: #cc0000;
            color: #fff;
        }
        .shop-card .shop-img .verified-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
        }
        .shop-card .shop-img .new-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #000;
            color: #fff;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
        }
        .shop-card .shop-info {
            padding: 12px 14px;
        }
        .shop-card .shop-info .name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .shop-card .shop-info .category {
            font-size: 12px;
            color: #888;
        }
        .shop-card .shop-info .address {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .shop-card .shop-info .rating-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .shop-card .shop-info .rating-row .stars {
            font-size: 14px;
            font-weight: 600;
        }
        .shop-card .shop-info .rating-row .count {
            font-size: 12px;
            color: #888;
        }
        .shop-card .shop-info .view-btn {
            margin-top: 8px;
            padding: 6px 16px;
            background: #000;
            color: #fff;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-block;
        }
        .shop-card .shop-info .view-btn:hover {
            opacity: 0.8;
        }
        .shop-card .shop-info .match-highlight {
            background: #ffff99;
            padding: 0 2px;
        }

        /* ===== SEARCH RESULTS INFO ===== */
        .results-info {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        .results-info strong {
            color: #000;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            grid-column: 1 / -1;
        }
        .empty-state .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .empty-state h3 {
            color: #000;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .empty-state p {
            font-size: 14px;
        }
        .empty-state .btn-secondary {
            margin-top: 12px;
            padding: 10px 24px;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .empty-state .btn-secondary:hover {
            opacity: 0.8;
        }
        .empty-state .suggestions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .empty-state .suggestions .suggestion-chip {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 13px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .empty-state .suggestions .suggestion-chip:hover {
            border-color: #000;
            background: #fff;
        }

        /* ===== LOAD MORE ===== */
        .load-more-container {
            text-align: center;
            padding: 20px 0 30px;
        }
        .load-more-btn {
            padding: 12px 40px;
            background: #000;
            color: #fff;
            border: 1px solid #000;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .load-more-btn:hover:not(:disabled) {
            opacity: 0.8;
        }
        .load-more-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== SKELETON ===== */
        .skeleton {
            background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%);
            background-size: 200%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton-card {
            height: 280px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: #000;
            color: #fff;
            padding: 14px 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.success { background: #000; }
        .toast.error { background: #cc0000; }
        .toast.warning { background: #cc8800; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            display: none;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 99;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #888;
            transition: color 0.2s;
            cursor: pointer;
            gap: 2px;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
        }
        .bottom-nav .nav-item.active {
            color: #000;
        }
        .bottom-nav .nav-item .badge {
            position: absolute;
            top: -2px;
            right: -8px;
            background: #cc0000;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .bottom-nav .nav-item .badge.show {
            display: flex;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .bottom-nav { display: none !important; }
            .shop-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .shop-grid { grid-template-columns: repeat(4, 1fr); }
            .container { padding: 0 32px; }
        }
        @media (max-width: 767px) {
            .bottom-nav { display: flex; }
            .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .shop-card .shop-img { height: 110px; }
            .filter-bar { gap: 6px; }
            .filter-chip { font-size: 12px; padding: 4px 12px; }
        }
        @media (max-width: 400px) {
            .shop-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .shop-card .shop-img { height: 100px; }
        }
    </style>
</head>
<body>

    <!-- ===== TOP NAVBAR ===== -->
    <nav class="navbar">
        <div class="logo">
            <span>🦁</span>
            Simha
            <span class="sub">Nepal</span>
        </div>
        <div class="nav-actions">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <span class="page-title" id="pageTitle">Shops</span>
            <div class="profile-avatar" id="profileAvatar" onclick="window.location.href='profile.html'">👤</div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container">

        <!-- ===== SEARCH BAR ===== -->
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search shops, products or services..." 
                   onkeyup="handleSearch(this.value)" onkeydown="if(event.key==='Enter') doSearch()">
            <span class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</span>
            <span class="voice-btn" id="voiceBtn" onclick="toggleVoiceSearch()" title="Voice search">🎤</span>
        </div>

        <!-- ===== RECENT SEARCHES ===== -->
        <div class="recent-searches" id="recentSearches"></div>

        <!-- ===== RESULTS INFO ===== -->
        <div class="results-info" id="resultsInfo">
            Showing <strong id="resultCount">0</strong> shops
        </div>

        <!-- ===== FILTER BAR ===== -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-chip active" data-filter="all" onclick="applyFilter('all')">All <span class="count" id="countAll">0</span></button>
            <button class="filter-chip" data-filter="Grocery Stores" onclick="applyFilter('Grocery Stores')">🛒 Grocery <span class="count" id="countGrocery">0</span></button>
            <button class="filter-chip" data-filter="Mobile Shops" onclick="applyFilter('Mobile Shops')">📱 Mobile <span class="count" id="countMobile">0</span></button>
            <button class="filter-chip" data-filter="Clothing Stores" onclick="applyFilter('Clothing Stores')">👕 Clothing <span class="count" id="countClothing">0</span></button>
            <button class="filter-chip" data-filter="Electronics Shops" onclick="applyFilter('Electronics Shops')">💻 Electronics <span class="count" id="countElectronics">0</span></button>
            <button class="filter-chip" data-filter="Restaurants & Food" onclick="applyFilter('Restaurants & Food')">🍽️ Food <span class="count" id="countFood">0</span></button>
            <button class="filter-chip" data-filter="Hardware Stores" onclick="applyFilter('Hardware Stores')">🔧 Hardware <span class="count" id="countHardware">0</span></button>
            <button class="filter-chip" data-filter="Pharmacy" onclick="applyFilter('Pharmacy')">💊 Pharmacy <span class="count" id="countPharmacy">0</span></button>
            <button class="filter-chip" data-filter="Agriculture Stores" onclick="applyFilter('Agriculture Stores')">🌱 Agriculture <span class="count" id="countAgriculture">0</span></button>
            <button class="filter-chip" data-filter="Beauty & Saloon" onclick="applyFilter('Beauty & Saloon')">💄 Beauty <span class="count" id="countBeauty">0</span></button>
        </div>

        <!-- ===== SHOP GRID ===== -->
        <div class="shop-grid" id="shopGrid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>

        <!-- ===== LOAD MORE ===== -->
        <div class="load-more-container">
            <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load More</button>
        </div>

    </main>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='index.html'">
            <span class="icon">🏠</span> Home
        </button>
        <button class="nav-item active" onclick="window.location.href='shop-listing.html'">
            <span class="icon">🏪</span> Shops
        </button>
        <button class="nav-item" onclick="window.location.href='cart.html'">
            <span class="icon">🛒</span> Cart
            <span class="badge" id="cartBadge">0</span>
        </button>
        <button class="nav-item" onclick="window.location.href='orders.html'">
            <span class="icon">📋</span> Orders
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
            <span class="icon">👤</span> Profile
        </button>
    </nav>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================ -->
    <!-- ===== FIREBASE + ALL JAVASCRIPT (INTERNAL) ===== -->
    <!-- ============================================================ -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
        }
    }
    </script>

    <script type="module">
        // ============================================================
        // FIREBASE IMPORTS
        // ============================================================
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged } from 'firebase/auth';
        import {
            getFirestore,
            collection,
            doc,
            getDocs,
            getDoc,
            query,
            where,
            limit,
            startAfter,
            orderBy
        } from 'firebase/firestore';

        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
            authDomain: "bishalshrestha17-de676.firebaseapp.com",
            projectId: "bishalshrestha17-de676",
            storageBucket: "bishalshrestha17-de676.firebasestorage.app",
            messagingSenderId: "631628771230",
            appId: "1:631628771230:web:389c6430535f6a46b6708f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================
        // STATE
        // ============================================================
        let allShops = [];
        let filteredShops = [];
        let displayedShops = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let lastDoc = null;
        let isLoading = false;
        let hasMore = true;
        const PAGE_SIZE = 12;
        let isVoiceSearching = false;
        let recognition = null;

        // ============================================================
        // DOM REFS
        // ============================================================
        const shopGrid = document.getElementById('shopGrid');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const cartBadge = document.getElementById('cartBadge');
        const profileAvatar = document.getElementById('profileAvatar');
        const pageTitle = document.getElementById('pageTitle');
        const resultsInfo = document.getElementById('resultsInfo');
        const resultCount = document.getElementById('resultCount');
        const recentSearches = document.getElementById('recentSearches');
        const voiceBtn = document.getElementById('voiceBtn');

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        window.showToast = showToast;

        // ============================================================
        // GET URL PARAMS
        // ============================================================
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            const search = params.get('search');
            if (category && category !== 'all' && category !== 'null') {
                currentFilter = category;
                pageTitle.textContent = category;
                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.classList.toggle('active', chip.dataset.filter === category);
                });
            }
            if (search) {
                searchQuery = search;
                searchInput.value = search;
                clearBtn.classList.add('show');
                pageTitle.textContent = `Search: "${search}"`;
                // Save to recent searches
                saveRecentSearch(search);
            }
        }

        // ============================================================
        // RECENT SEARCHES
        // ============================================================
        function getRecentSearches() {
            try {
                return JSON.parse(localStorage.getItem('recentSearches') || '[]');
            } catch {
                return [];
            }
        }

        function saveRecentSearch(query) {
            if (!query.trim()) return;
            let recent = getRecentSearches();
            recent = recent.filter(q => q.toLowerCase() !== query.toLowerCase());
            recent.unshift(query);
            if (recent.length > 5) recent.pop();
            localStorage.setItem('recentSearches', JSON.stringify(recent));
            renderRecentSearches();
        }

        function renderRecentSearches() {
            const recent = getRecentSearches();
            if (recent.length === 0 || searchQuery) {
                recentSearches.innerHTML = '';
                return;
            }
            recentSearches.innerHTML = recent.map(q => `
                <span class="recent-search-chip" onclick="searchInput.value='${q}'; doSearch();">🔍 ${q}</span>
            `).join('');
        }

        // ============================================================
        // VOICE SEARCH
        // ============================================================
        window.toggleVoiceSearch = function() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast('Voice search not supported in this browser', 'warning');
                return;
            }

            if (isVoiceSearching) {
                if (recognition) recognition.stop();
                isVoiceSearching = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = function() {
                isVoiceSearching = true;
                voiceBtn.classList.add('recording');
                voiceBtn.textContent = '⏹️';
                showToast('🎤 Listening... Speak now', 'info');
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                searchInput.value = transcript;
                searchQuery = transcript;
                clearBtn.classList.add('show');
                doSearch();
                saveRecentSearch(transcript);
                isVoiceSearching = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
            };

            recognition.onerror = function(event) {
                console.log('Voice error:', event.error);
                if (event.error !== 'aborted') {
                    showToast('Voice search error: ' + event.error, 'error');
                }
                isVoiceSearching = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
            };

            recognition.onend = function() {
                isVoiceSearching = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.textContent = '🎤';
            };

            recognition.start();
        };

        // ============================================================
        // LOAD SHOPS
        // ============================================================
        async function loadShops() {
            try {
                isLoading = true;
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = 'Loading...';

                let q;
                if (currentFilter !== 'all' && currentFilter !== 'null') {
                    q = query(
                        collection(db, 'shops'),
                        where('isActive', '==', true),
                        where('category', '==', currentFilter),
                        limit(PAGE_SIZE)
                    );
                } else {
                    q = query(
                        collection(db, 'shops'),
                        where('isActive', '==', true),
                        limit(PAGE_SIZE)
                    );
                }

                const snapshot = await getDocs(q);
                const shops = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                lastDoc = snapshot.docs[snapshot.docs.length - 1] || null;
                hasMore = snapshot.docs.length === PAGE_SIZE;

                allShops = shops;
                filteredShops = applySearch(shops);
                displayedShops = filteredShops;
                renderShops(filteredShops);
                updateCounts();
                updateResultsInfo();

                isLoading = false;
                loadMoreBtn.disabled = !hasMore;
                loadMoreBtn.textContent = hasMore ? 'Load More' : 'No More Shops';

            } catch (error) {
                console.error('Error loading shops:', error);
                isLoading = false;
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = 'Failed to load';
                showToast('Failed to load shops', 'error');
                shopGrid.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">⚠️</span>
                        <h3>Failed to load shops</h3>
                        <p>${error.message || 'Check your internet connection'}</p>
                        <button class="btn-secondary" onclick="location.reload()">🔄 Retry</button>
                    </div>
                `;
            }
        }

        // ============================================================
        // LOAD MORE
        // ============================================================
        window.loadMore = async function() {
            if (isLoading || !hasMore || !lastDoc) return;

            try {
                isLoading = true;
                loadMoreBtn.disabled = true;
                loadMoreBtn.textContent = 'Loading...';

                let q;
                if (currentFilter !== 'all' && currentFilter !== 'null') {
                    q = query(
                        collection(db, 'shops'),
                        where('isActive', '==', true),
                        where('category', '==', currentFilter),
                        startAfter(lastDoc),
                        limit(PAGE_SIZE)
                    );
                } else {
                    q = query(
                        collection(db, 'shops'),
                        where('isActive', '==', true),
                        startAfter(lastDoc),
                        limit(PAGE_SIZE)
                    );
                }

                const snapshot = await getDocs(q);
                const newShops = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                lastDoc = snapshot.docs[snapshot.docs.length - 1] || null;
                hasMore = snapshot.docs.length === PAGE_SIZE;

                allShops = [...allShops, ...newShops];
                filteredShops = applySearch(allShops);
                displayedShops = filteredShops;
                renderShops(filteredShops);
                updateCounts();
                updateResultsInfo();

                isLoading = false;
                loadMoreBtn.disabled = !hasMore;
                loadMoreBtn.textContent = hasMore ? 'Load More' : 'No More Shops';

            } catch (error) {
                console.error('Error loading more shops:', error);
                isLoading = false;
                loadMoreBtn.disabled = false;
                loadMoreBtn.textContent = 'Load More';
                showToast('Failed to load more shops', 'error');
            }
        };

        // ============================================================
        // APPLY SEARCH
        // ============================================================
        function applySearch(shops) {
            if (!searchQuery.trim()) return shops;
            const query = searchQuery.toLowerCase().trim();
            return shops.filter(shop => 
                shop.shopName?.toLowerCase().includes(query) ||
                shop.category?.toLowerCase().includes(query) ||
                shop.district?.toLowerCase().includes(query) ||
                shop.address?.toLowerCase().includes(query) ||
                shop.description?.toLowerCase().includes(query)
            );
        }

        // ============================================================
        // HIGHLIGHT MATCH
        // ============================================================
        function highlightMatch(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="match-highlight">$1</span>');
        }

        // ============================================================
        // RENDER SHOPS
        // ============================================================
        function renderShops(shops) {
            if (shops.length === 0) {
                const suggestions = ['Grocery', 'Mobile', 'Electronics', 'Clothing', 'Pharmacy'];
                shopGrid.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">🔍</span>
                        <h3>No shops found</h3>
                        <p>Try adjusting your search or filter</p>
                        <div class="suggestions">
                            ${suggestions.map(s => `
                                <span class="suggestion-chip" onclick="searchInput.value='${s}'; doSearch();">${s}</span>
                            `).join('')}
                        </div>
                        <button class="btn-secondary" onclick="clearAllFilters()">Clear Filters</button>
                    </div>
                `;
                return;
            }

            const query = searchQuery.trim().toLowerCase();

            shopGrid.innerHTML = shops.map(shop => {
                const name = query ? highlightMatch(shop.shopName || 'Shop', query) : (shop.shopName || 'Shop');
                const category = query ? highlightMatch(shop.category || '', query) : (shop.category || '');
                const address = query ? highlightMatch(`${shop.address || ''}, ${shop.district || ''}`, query) : `${shop.address || ''}, ${shop.district || ''}`;

                return `
                    <div class="shop-card" onclick="window.location.href='shop-detail.html?shopId=${shop.shopId || shop.id}'">
                        <div class="shop-img">
                            <img src="${shop.shopPhotoURL || 'https://picsum.photos/seed/shop' + Math.random() + '/400/300'}"
                                 alt="${shop.shopName}" loading="lazy"
                                 onerror="this.src='https://picsum.photos/400/300'">
                            <span class="status-badge ${shop.isOpen ? 'open' : 'closed'}">
                                ${shop.isOpen ? 'Open' : 'Closed'}
                            </span>
                            ${shop.isVerified ? '<span class="verified-badge">✅ Verified</span>' : ''}
                            ${isNewShop(shop.createdAt) ? '<span class="new-badge">✨ New</span>' : ''}
                        </div>
                        <div class="shop-info">
                            <div class="name">${name}</div>
                            <div class="category">${category}</div>
                            <div class="address">📍 ${address}</div>
                            <div class="rating-row">
                                <span class="stars">⭐ ${shop.rating || 0}</span>
                                <span class="count">(${shop.reviewCount || 0} reviews)</span>
                            </div>
                            <button class="view-btn" onclick="event.stopPropagation(); window.location.href='shop-detail.html?shopId=${shop.shopId || shop.id}'">
                                View Shop →
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================================
        // IS NEW SHOP
        // ============================================================
        function isNewShop(timestamp) {
            if (!timestamp) return false;
            let date;
            if (timestamp.toDate) {
                date = timestamp.toDate();
            } else if (timestamp.seconds) {
                date = new Date(timestamp.seconds * 1000);
            } else {
                date = new Date(timestamp);
            }
            const days = (Date.now() - date.getTime()) / (1000 * 60 * 60 * 24);
            return days < 7;
        }

        // ============================================================
        // UPDATE COUNTS
        // ============================================================
        function updateCounts() {
            const categories = ['all', 'Grocery Stores', 'Mobile Shops', 'Clothing Stores', 
                'Electronics Shops', 'Restaurants & Food', 'Hardware Stores', 
                'Pharmacy', 'Agriculture Stores', 'Beauty & Saloon'];
            
            categories.forEach(cat => {
                const count = cat === 'all' 
                    ? allShops.length 
                    : allShops.filter(s => s.category === cat).length;
                const el = document.getElementById(`count${cat.replace(/[^a-zA-Z]/g, '')}`);
                if (el) el.textContent = count;
            });
        }

        // ============================================================
        // UPDATE RESULTS INFO
        // ============================================================
        function updateResultsInfo() {
            const total = filteredShops.length;
            resultCount.textContent = total;
            if (searchQuery) {
                resultsInfo.innerHTML = `Showing <strong>${total}</strong> shops matching "<strong>${searchQuery}</strong>"`;
            } else if (currentFilter !== 'all' && currentFilter !== 'null') {
                resultsInfo.innerHTML = `Showing <strong>${total}</strong> shops in <strong>${currentFilter}</strong>`;
            } else {
                resultsInfo.innerHTML = `Showing <strong>${total}</strong> shops`;
            }
        }

        // ============================================================
        // APPLY FILTER
        // ============================================================
        window.applyFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.filter === filter);
            });
            pageTitle.textContent = filter === 'all' || filter === 'null' ? 'Shops' : filter;
            
            // Reset pagination
            lastDoc = null;
            hasMore = true;
            allShops = [];
            
            // Reload shops
            loadShops();
        };

        // ============================================================
        // HANDLE SEARCH
        // ============================================================
        window.handleSearch = function(value) {
            searchQuery = value;
            clearBtn.classList.toggle('show', value.length > 0);
            
            if (value.length === 0) {
                pageTitle.textContent = currentFilter === 'all' || currentFilter === 'null' ? 'Shops' : currentFilter;
                // Reset and reload
                lastDoc = null;
                hasMore = true;
                allShops = [];
                loadShops();
            } else {
                pageTitle.textContent = `Search: "${value}"`;
                // Filter already loaded shops
                filteredShops = applySearch(allShops);
                displayedShops = filteredShops;
                renderShops(filteredShops);
                updateResultsInfo();
            }
        };

        // ============================================================
        // DO SEARCH (Enter key)
        // ============================================================
        window.doSearch = function() {
            const query = searchInput.value.trim();
            if (query) {
                searchQuery = query;
                saveRecentSearch(query);
                lastDoc = null;
                hasMore = true;
                allShops = [];
                pageTitle.textContent = `Search: "${query}"`;
                loadShops();
            } else {
                // If empty, reset
                searchQuery = '';
                lastDoc = null;
                hasMore = true;
                allShops = [];
                pageTitle.textContent = currentFilter === 'all' || currentFilter === 'null' ? 'Shops' : currentFilter;
                loadShops();
            }
        };

        // ============================================================
        // CLEAR SEARCH
        // ============================================================
        window.clearSearch = function() {
            searchInput.value = '';
            searchQuery = '';
            clearBtn.classList.remove('show');
            pageTitle.textContent = currentFilter === 'all' || currentFilter === 'null' ? 'Shops' : currentFilter;
            lastDoc = null;
            hasMore = true;
            allShops = [];
            loadShops();
            renderRecentSearches();
        };

        // ============================================================
        // CLEAR ALL FILTERS
        // ============================================================
        window.clearAllFilters = function() {
            searchInput.value = '';
            searchQuery = '';
            clearBtn.classList.remove('show');
            currentFilter = 'all';
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.filter === 'all');
            });
            pageTitle.textContent = 'Shops';
            lastDoc = null;
            hasMore = true;
            allShops = [];
            loadShops();
            renderRecentSearches();
        };

        // ============================================================
        // CART BADGE
        // ============================================================
        async function updateCartBadge() {
            const user = auth.currentUser;
            if (!user) {
                cartBadge.classList.remove('show');
                return;
            }
            try {
                const cartDoc = await getDoc(doc(db, 'cart', user.uid));
                if (cartDoc.exists()) {
                    const items = cartDoc.data().items || [];
                    const count = items.reduce((sum, item) => sum + (item.qty || 0), 0);
                    if (count > 0) {
                        cartBadge.textContent = count > 99 ? '99+' : count;
                        cartBadge.classList.add('show');
                    } else {
                        cartBadge.classList.remove('show');
                    }
                } else {
                    cartBadge.classList.remove('show');
                }
            } catch (error) {
                console.error('Error updating cart badge:', error);
            }
        }

        // ============================================================
        // PROFILE AVATAR
        // ============================================================
        function updateProfileAvatar(user) {
            if (user) {
                const name = user.displayName || user.email || 'User';
                const initial = name.charAt(0).toUpperCase();
                profileAvatar.textContent = initial;
                profileAvatar.style.background = '#000';
                profileAvatar.style.color = '#fff';
                profileAvatar.style.border = '2px solid #000';
                if (user.photoURL) {
                    profileAvatar.innerHTML = `<img src="${user.photoURL}" alt="${name}">`;
                }
            } else {
                profileAvatar.textContent = '👤';
                profileAvatar.style.background = 'transparent';
                profileAvatar.style.color = '#000';
                profileAvatar.style.border = '2px solid #e0e0e0';
                profileAvatar.innerHTML = '👤';
            }
        }

        // ============================================================
        // AUTH STATE
        // ============================================================
        onAuthStateChanged(auth, (user) => {
            updateProfileAvatar(user);
            updateCartBadge();
        });

        // ============================================================
        // INIT
        // ============================================================
        getUrlParams();
        renderRecentSearches();
        loadShops();

        // ============================================================
        // GLOBAL FUNCTIONS
        // ============================================================
        window.loadMore = window.loadMore;
        window.applyFilter = window.applyFilter;
        window.handleSearch = window.handleSearch;
        window.doSearch = window.doSearch;
        window.clearSearch = window.clearSearch;
        window.clearAllFilters = window.clearAllFilters;
        window.toggleVoiceSearch = window.toggleVoiceSearch;
        window.showToast = showToast;

        console.log('🚀 Shop Listing Page loaded with search');
    </script>
</body>
</html>
